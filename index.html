<!DOCTYPE html>
<html>
<head>
  <title>Excuse Generator</title>
</head>
<body>
  <h1>Excuse Generator</h1>
  <button onclick="generate()">Give me an excuse</button>
  <button onclick="copyExcuse()">Copy to clipboard</button>
  <p id="output"></p>
  <p id="copyStatus"></p>

  <script>
    const excuses = [
      "My cat deleted the file.",
      "I was mentally preparing.",
      "Mercury is in retrograde.",
      "My pants tore.",
      "i love dosa, i ate a lot of it."
    ];
    function generate() {
      const random = excuses[Math.floor(Math.random() * excuses.length)];
      document.getElementById("output").innerText = random;
      document.getElementById("copyStatus").innerText = "";
    }
    function copyExcuse() {
      const text = document.getElementById("output").innerText;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById("copyStatus").innerText = "Copied!";
      });
    }
  </script>
</body>
</html>
